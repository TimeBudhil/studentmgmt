spring.application.name=studentmgmt

# ===================================================================
# DATASOURCE CONFIGURATION
# ===================================================================
#spring.datasource.url=jdbc:h2:mem:devdb
#spring.datasource.driver-class-name=org.h2.Driver
#spring.datasource.username=sa
#spring.datasource.password=password
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# ===================================================================
# JPA / HIBERNATE CONFIGURATION
# ===================================================================
#spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# spring.jpa.hibernate.ddl-auto=update

# Logging and debugging SQL queries
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.highlight_sql=true

# Ensures schema.sql or data.sql are run after Hibernate initializes the schema
spring.jpa.defer-datasource-initialization=true

# Force Spring Boot to run data.sql/schema.sql on non-embedded databases
spring.sql.init.mode=always

spring.docker.compose.skip.in-tests=false